<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANA LAÍS 15 ANOS — Galeria de Fotos</title>
<style>
:root{--gold:#C9A84C;--gold-light:#D9A441;--bg:#FFF3F7;--bg-card:#FFE1EC;--bg-card2:#FFD2E2;--text:#5A3A45;--text-muted:#A87888;--info:#D9A441;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Georgia,'Times New Roman',serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:linear-gradient(135deg,var(--bg) 0%,#FFE1EC 100%);border-bottom:1px solid color-mix(in srgb,var(--gold) 15%,transparent);padding:1.5rem;text-align:center;position:sticky;top:0;z-index:50;}
.header h1{font-size:1.6rem;font-weight:400;letter-spacing:.12em;color:var(--gold);margin-bottom:.3rem;}
.header p{font-size:.8rem;color:var(--text-muted);}
.stats-bar{display:flex;align-items:center;justify-content:center;gap:1rem;padding:1rem;background:var(--bg-card);border-bottom:1px solid color-mix(in srgb,var(--gold) 10%,transparent);flex-wrap:wrap;}
.stat{font-size:.85rem;color:var(--text-muted);}.stat strong{color:var(--gold);}
.groups-container{padding:1rem;max-width:900px;margin:0 auto;}
.group{background:var(--bg-card);border:1px solid color-mix(in srgb,var(--gold) 12%,transparent);border-radius:16px;margin-bottom:1rem;overflow:hidden;}
.group-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;background:var(--bg-card2);border-bottom:1px solid color-mix(in srgb,var(--gold) 10%,transparent);cursor:pointer;user-select:none;}
.group-header:hover{background:color-mix(in srgb,var(--gold) 8%,var(--bg-card2));}
.group-name{font-size:1.1rem;color:var(--gold);font-weight:400;}
.group-meta{font-size:.75rem;color:var(--text-muted);margin-top:.2rem;}
.group-toggle{width:36px;height:36px;border-radius:50%;border:1px solid color-mix(in srgb,var(--gold) 25%,transparent);background:color-mix(in srgb,var(--gold) 12%,transparent);color:var(--gold);font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:1rem;-webkit-appearance:none;}
.photos-grid{display:none;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.6rem;padding:1rem;}
.photos-grid.open{display:grid;}
.photo-card{position:relative;border-radius:10px;overflow:hidden;background:var(--bg);border:1px solid color-mix(in srgb,var(--gold) 8%,transparent);aspect-ratio:1;}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-overlay{position:absolute;bottom:0;left:0;right:0;padding:.4rem;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);display:flex;align-items:flex-end;justify-content:space-between;gap:.3rem;}
.photo-time{font-size:.6rem;color:var(--text-muted);white-space:nowrap;}
.btn-dl{width:32px;height:32px;border-radius:50%;border:1px solid color-mix(in srgb,var(--gold) 50%,transparent);background:rgba(0,0,0,.6);color:var(--gold);font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;flex-shrink:0;transition:all .15s;}
.btn-dl:hover{background:color-mix(in srgb,var(--gold) 25%,rgba(0,0,0,.6));transform:scale(1.1);}
.loading{text-align:center;padding:3rem;}
.spinner{width:40px;height:40px;border:3px solid color-mix(in srgb,var(--gold) 20%,transparent);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{text-align:center;padding:3rem;color:var(--text-muted);}
.empty-state .icon{font-size:3rem;margin-bottom:1rem;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-card);border:1px solid color-mix(in srgb,var(--gold) 30%,transparent);color:var(--text);padding:.8rem 1.5rem;border-radius:12px;font-size:.85rem;z-index:100;transition:transform .3s ease;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
@media(max-width:480px){.photos-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.4rem;padding:.6rem;}.group-header{padding:.8rem;}.group-name{font-size:.95rem;}}
</style>
</head>
<body>
<div class="header"><h1>ANA LAÍS</h1><p>15 Anos • 15 ANOS</p></div>
<div class="stats-bar"><span class="stat" id="stat-total">Carregando...</span></div>
<div class="groups-container" id="groups-container">
  <div class="loading"><div class="spinner"></div><p style="color:var(--text-muted);font-size:.85rem;">Carregando fotos...</p></div>
</div>
<div class="toast" id="toast"></div>
<script>
const EVENT_ID="ana-lais-15-anos",API_BASE="https://qrfotos.duckdns.org";
async function loadPhotos(){
  const c=document.getElementById("groups-container");
  try{
    const r=await fetch(API_BASE+"/photos/"+EVENT_ID);
    if(!r.ok)throw new Error(r.status);
    const data=await r.json();
    if(data.totalPhotos===0){c.innerHTML='<div class="empty-state"><div class="icon">📷</div><p>Nenhuma foto ainda.<br>Escaneie o QR Code para começar!</p></div>';document.getElementById("stat-total").textContent="0 fotos";return;}
    const sz=(data.totalSize/1048576).toFixed(1);
    document.getElementById("stat-total").innerHTML="<strong>"+data.totalPhotos+"</strong> fotos · <strong>"+sz+"</strong> MB · <strong>"+Object.keys(data.groups).length+"</strong> grupos";
    let h="";
    for(const[nome,g] of Object.entries(data.groups)){
      const gid=nome.replace(/[^a-zA-Z0-9]/g,"_"),gsz=(g.totalSize/1048576).toFixed(1);
      const ft=g.photos[0]?.uploadedAt?new Date(g.photos[0].uploadedAt).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"";
      h+='<div class="group"><div class="group-header" onclick="toggleGroup(&quot;'+gid+'&quot;)"><div><div class="group-name">👤 '+esc(nome)+'</div><div class="group-meta">'+g.count+" foto"+(g.count>1?"s":"")+" · "+gsz+" MB · "+ft+'</div></div><button class="group-toggle" id="btn-'+gid+'">▼</button></div><div class="photos-grid open" id="grid-'+gid+'">';
      for(const p of g.photos){
        const t=p.uploadedAt?new Date(p.uploadedAt).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"";
        h+='<div class="photo-card"><img src="'+API_BASE+"/download/"+EVENT_ID+"/"+p.filename+'" alt="" loading="lazy"><div class="photo-overlay"><span class="photo-time">'+t+'</span><button class="btn-dl" onclick="dl(&quot;'+p.filename+'&quot;)" title="Baixar">⬇</button></div></div>';
      }
      h+="</div></div>";
    }
    c.innerHTML=h;
  }catch(e){c.innerHTML='<div class="empty-state"><div class="icon">⚠️</div><p>Erro ao carregar fotos.</p><button class="group-toggle" onclick="loadPhotos()" style="margin-top:1rem;padding:.5rem 1rem;">🔄 Tentar</button></div>';document.getElementById("stat-total").textContent="Erro";}
}
function toggleGroup(id){const g=document.getElementById("grid-"+id),b=document.getElementById("btn-"+id);if(g.classList.contains("open")){g.classList.remove("open");b.textContent="▶";}else{g.classList.add("open");b.textContent="▼";}}
function dl(f){window.open(API_BASE+"/download/"+EVENT_ID+"/"+f,"_blank");showToast("⬇️ Download iniciado");}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function showToast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);}
loadPhotos();setInterval(loadPhotos,30000);
</script>
</body>
</html>
