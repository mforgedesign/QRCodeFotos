<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XV Giovana — Galeria de Fotos</title>
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8D48B;
  --rose: #C77B8B;
  --rose-dark: #8B4557;
  --bg: #1A0A10;
  --bg-card: #2A1018;
  --bg-card2: #321520;
  --text: #F5EDE0;
  --text-muted: #A08090;
  --success: #4CAF50;
  --danger: #E53935;
  --info: #42A5F5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Georgia', 'Times New Roman', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, var(--bg) 0%, #2A0A18 100%);
  border-bottom: 1px solid rgba(201, 168, 76, 0.15);
  padding: 1.5rem;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 50;
}

.header h1 {
  font-size: 1.6rem;
  font-weight: 400;
  letter-spacing: 0.12em;
  color: var(--gold);
  margin-bottom: 0.3rem;
}

.header p {
  font-size: 0.8rem;
  color: var(--text-muted);
}

/* ── Stats bar ── */
.stats-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  padding: 1rem;
  background: var(--bg-card);
  border-bottom: 1px solid rgba(201, 168, 76, 0.1);
  flex-wrap: wrap;
}

.stat {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.stat strong {
  color: var(--gold);
}

/* ── Groups ── */
.groups-container {
  padding: 1rem;
  max-width: 900px;
  margin: 0 auto;
}

.group {
  background: var(--bg-card);
  border: 1px solid rgba(201, 168, 76, 0.12);
  border-radius: 16px;
  margin-bottom: 1rem;
  overflow: hidden;
}

.group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.2rem;
  background: var(--bg-card2);
  border-bottom: 1px solid rgba(201, 168, 76, 0.1);
  cursor: pointer;
  user-select: none;
}

.group-header:hover {
  background: rgba(201, 168, 76, 0.08);
}

.group-name {
  font-size: 1.1rem;
  color: var(--gold);
  font-weight: 400;
}

.group-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 0.2rem;
}

.group-toggle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(201, 168, 76, 0.25);
  background: rgba(201, 168, 76, 0.12);
  color: var(--gold);
  font-size: 0.8rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-left: 1rem;
  -webkit-appearance: none;
}

/* ── Photos grid ── */
.photos-grid {
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.6rem;
  padding: 1rem;
}

.photos-grid.open {
  display: grid;
}

.photo-card {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  background: var(--bg);
  border: 1px solid rgba(201, 168, 76, 0.08);
  aspect-ratio: 1;
}

.photo-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.photo-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 0.4rem;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 0.3rem;
}

.photo-time {
  font-size: 0.6rem;
  color: var(--text-muted);
  white-space: nowrap;
}

.btn-download-one {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid rgba(201, 168, 76, 0.5);
  background: rgba(0,0,0,0.6);
  color: var(--gold);
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-appearance: none;
  flex-shrink: 0;
  transition: all 0.15s;
}

.btn-download-one:hover {
  background: rgba(201, 168, 76, 0.25);
  transform: scale(1.1);
}

/* ── Loading / Empty ── */
.loading {
  text-align: center;
  padding: 3rem;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(201, 168, 76, 0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--text-muted);
}

.empty-state .icon {
  font-size: 3rem;
  margin-bottom: 1rem;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-card);
  border: 1px solid rgba(201, 168, 76, 0.3);
  color: var(--text);
  padding: 0.8rem 1.5rem;
  border-radius: 12px;
  font-size: 0.85rem;
  z-index: 100;
  transition: transform 0.3s ease;
  text-align: center;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .photos-grid {
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 0.4rem;
    padding: 0.6rem;
  }
  .group-header { padding: 0.8rem; }
  .group-name { font-size: 0.95rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>XV GIOVANA</h1>
  <p>Galeria de Fotos</p>
</div>

<div class="stats-bar">
  <span class="stat" id="stat-total">Carregando...</span>
</div>

<div class="groups-container" id="groups-container">
  <div class="loading">
    <div class="spinner"></div>
    <p style="color:var(--text-muted);font-size:0.85rem;">Carregando fotos...</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = 'https://qrfotos.duckdns.org';

async function loadPhotos() {
  const container = document.getElementById('groups-container');
  try {
    const resp = await fetch(`${API_BASE}/photos`);
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();

    if (data.totalPhotos === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">📷</div>
          <p>Nenhuma foto ainda.<br>Escaneie o QR Code para começar!</p>
        </div>`;
      document.getElementById('stat-total').textContent = '0 fotos';
      return;
    }

    const sizeMB = (data.totalSize / 1048576).toFixed(1);
    document.getElementById('stat-total').innerHTML =
      `<strong>${data.totalPhotos}</strong> fotos · <strong>${sizeMB}</strong> MB · <strong>${Object.keys(data.groups).length}</strong> grupos`;

    let html = '';
    for (const [nome, group] of Object.entries(data.groups)) {
      const groupId = nome.replace(/[^a-zA-Z0-9]/g, '_');
      const groupSizeMB = (group.totalSize / 1048576).toFixed(1);
      const firstTime = group.photos[0]?.uploadedAt
        ? new Date(group.photos[0].uploadedAt).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})
        : '';

      html += `
        <div class="group">
          <div class="group-header" onclick="toggleGroup('${groupId}')">
            <div>
              <div class="group-name">👤 ${escapeHtml(nome)}</div>
              <div class="group-meta">${group.count} foto${group.count>1?'s':''} · ${groupSizeMB} MB · ${firstTime}</div>
            </div>
            <button class="group-toggle" id="btn-${groupId}">▼</button>
          </div>
          <div class="photos-grid open" id="grid-${groupId}">`;

      for (const photo of group.photos) {
        const time = photo.uploadedAt
          ? new Date(photo.uploadedAt).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})
          : '';
        html += `
          <div class="photo-card">
            <img src="${API_BASE}/download/${photo.filename}" alt="" loading="lazy"
                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%232A1018%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23A08090%22 font-size=%2214%22>📷</text></svg>'">
            <div class="photo-overlay">
              <span class="photo-time">${time}</span>
              <button class="btn-download-one" onclick="downloadOne('${photo.filename}')" title="Baixar foto">⬇</button>
            </div>
          </div>`;
      }

      html += `</div></div>`;
    }
    container.innerHTML = html;

  } catch (err) {
    console.error('[Load Error]', err);
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p>Erro ao carregar fotos.<br>Verifique se o servidor está online.</p>
        <button class="group-toggle" onclick="loadPhotos()" style="margin-top:1rem;padding:0.5rem 1rem;">🔄 Tentar</button>
      </div>`;
    document.getElementById('stat-total').textContent = 'Erro';
  }
}

function toggleGroup(id) {
  const grid = document.getElementById(`grid-${id}`);
  const btn = document.getElementById(`btn-${id}`);
  if (grid.classList.contains('open')) {
    grid.classList.remove('open');
    btn.textContent = '▶';
  } else {
    grid.classList.add('open');
    btn.textContent = '▼';
  }
}

function downloadOne(filename) {
  window.open(`${API_BASE}/download/${filename}`, '_blank');
  showToast('⬇️ Download iniciado');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadPhotos();
setInterval(loadPhotos, 30000);
</script>
</body>
</html>
